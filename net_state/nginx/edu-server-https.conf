# Edu Server Nginx HTTPS configuration.
# Use this file after certificates are installed under /etc/nginx/ssl/.
# Put it at /etc/nginx/conf.d/edu-server.conf.

limit_req_zone $binary_remote_addr zone=edu_auth:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=edu_api:10m rate=60r/m;

upstream edu_server_backend {
    server 127.0.0.1:55555;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name bai-yu.cn www.bai-yu.cn;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name bai-yu.cn www.bai-yu.cn;

    client_max_body_size 500m;

    ssl_certificate     /etc/nginx/ssl/bai-yu.cn.crt;
    ssl_certificate_key /etc/nginx/ssl/bai-yu.cn.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/nginx/ssl/bai-yu.cn.crt;
    resolver 223.5.5.5 119.29.29.29 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    access_log /var/log/nginx/edu-server-https-access.log;
    error_log  /var/log/nginx/edu-server-https-error.log;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location /api/auth/ {
        limit_req zone=edu_auth burst=3 nodelay;

        proxy_pass http://edu_server_backend/api/auth/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /api/ {
        limit_req zone=edu_api burst=20 nodelay;

        proxy_pass http://edu_server_backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 16k;
        proxy_busy_buffers_size 24k;
    }

    location /api/videos/ {
        limit_req zone=edu_api burst=30 nodelay;

        proxy_pass http://edu_server_backend/api/videos/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /internal/video/ {
        internal;
        alias /tmp/edu/uploads/videos/;

        add_header Accept-Ranges bytes;

        types {
            video/mp4  mp4;
            video/webm webm;
            video/x-msvideo avi;
            video/quicktime mov;
            video/x-matroska mkv;
            video/x-flv flv;
        }
    }

    location /internal/cover/ {
        internal;
        alias /tmp/edu/uploads/covers/;

        types {
            image/jpeg jpg jpeg;
            image/png  png;
            image/webp webp;
        }
    }

    location /api/files/cover/ {
        proxy_pass http://edu_server_backend/api/files/cover/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    location /api/files/upload/ {
        limit_req zone=edu_api burst=5 nodelay;

        proxy_request_buffering on;
        proxy_pass http://edu_server_backend/api/files/upload/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location /docs {
        proxy_pass http://edu_server_backend/docs;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /openapi.json {
        proxy_pass http://edu_server_backend/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    # location /ws/ {
    #     proxy_pass http://edu_server_backend/ws/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "upgrade";
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto https;
    #
    #     proxy_read_timeout 86400s;
    #     proxy_send_timeout 86400s;
    # }

    location /health {
        proxy_pass http://edu_server_backend/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        access_log off;
    }
}
