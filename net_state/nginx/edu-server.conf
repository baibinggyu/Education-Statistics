# ============================================================
# Edu Server — Nginx 反向代理配置
# 文件位置: /etc/nginx/sites-available/edu-server
# 启用: sudo ln -s /etc/nginx/sites-available/edu-server /etc/nginx/sites-enabled/
# ============================================================

# ---- 限流区域定义 ----
# 需要在 http {} 块中定义 (通常放在 nginx.conf 的 http {} 内)

# limit_req_zone $binary_remote_addr zone=edu_auth:10m rate=5r/m;
#   → 登录/注册接口: 同一 IP 每分钟最多 5 次请求
#
# limit_req_zone $binary_remote_addr zone=edu_api:10m rate=60r/m;
#   → 通用 API: 同一 IP 每分钟最多 60 次请求
#
# client_max_body_size 500m;
#   → 上传文件最大 500MB


# ============================================================
# 主 Server 块
# ============================================================
server {
    listen 80;
    server_name your-domain.com;          # 替换为实际域名或 IP

    # ---- 日志 ----
    access_log /var/log/nginx/edu-server-access.log;
    error_log  /var/log/nginx/edu-server-error.log;

    # ---- 安全头 ----
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-XSS-Protection "1; mode=block";


    # ============================================================
    # 1. Auth 接口 (限流)
    # ============================================================
    location /api/auth/ {
        # 限流: 5 req/min, burst=3 (超过后排队)
        limit_req zone=edu_auth burst=3 nodelay;

        proxy_pass http://127.0.0.1:55555/api/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }


    # ============================================================
    # 2. 通用 API (正常限流)
    # ============================================================
    location /api/ {
        limit_req zone=edu_api burst=20 nodelay;

        proxy_pass http://127.0.0.1:55555/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 大请求体转发 (成绩批量上传等场景)
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 16k;
        proxy_busy_buffers_size 24k;
    }


    # ============================================================
    # 3. 视频流媒体专用端点
    #    FastAPI 鉴权后通过 X-Accel-Redirect 返回
    #    Nginx 直接提供文件，支持 Range 请求
    # ============================================================
    location /api/videos/ {
        limit_req zone=edu_api burst=30 nodelay;

        proxy_pass http://127.0.0.1:55555/api/videos/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 视频流超时设置
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }


    # ============================================================
    # 4. 内部视频文件 (外部不可直接访问)
    #    FastAPI 的 X-Accel-Redirect 指向这里
    #    internal; 指令确保只能由 Nginx 内部重定向访问
    # ============================================================
    location /internal/video/ {
        internal;
        alias /srv/edu/uploads/videos/;

        # 支持 HTTP Range (视频拖动)
        add_header Accept-Ranges bytes;

        # MIME 类型
        types {
            video/mp4  mp4;
            video/webm webm;
            video/x-msvideo avi;
            video/quicktime mov;
            video/x-matroska mkv;
            video/x-flv flv;
        }
    }

    # 内部封面文件
    location /internal/cover/ {
        internal;
        alias /srv/edu/uploads/covers/;

        types {
            image/jpeg jpg jpeg;
            image/png  png;
            image/webp webp;
        }
    }


    # ============================================================
    # 5. 公开静态文件 (封面图片可通过 /api/files/cover/ 公开访问)
    # ============================================================
    location /api/files/cover/ {
        # 封面不鉴权，直接代理到 FastAPI
        proxy_pass http://127.0.0.1:55555/api/files/cover/;
        proxy_set_header Host $host;

        # 浏览器缓存封面 1 天
        expires 1d;
        add_header Cache-Control "public, immutable";
    }


    # ============================================================
    # 6. 文件上传端点
    # ============================================================
    location /api/files/upload/ {
        limit_req zone=edu_api burst=5 nodelay;

        # 上传限速 10MB/s (保护服务器)
        # proxy_upload_rate 10m;

        proxy_pass http://127.0.0.1:55555/api/files/upload/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 上传超时
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }


    # ============================================================
    # 7. API 文档
    # ============================================================
    location /docs {
        proxy_pass http://127.0.0.1:55555/docs;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://127.0.0.1:55555/openapi.json;
        proxy_set_header Host $host;
    }


    # ============================================================
    # 8. WebSocket (第二阶段: 实时互动)
    # ============================================================
    # location /ws/ {
    #     proxy_pass http://127.0.0.1:55555/ws/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "upgrade";
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #
    #     proxy_read_timeout 86400s;   # WebSocket 长连接 24h
    #     proxy_send_timeout 86400s;
    # }


    # ============================================================
    # 9. 健康检查
    # ============================================================
    location /health {
        proxy_pass http://127.0.0.1:55555/;
        proxy_set_header Host $host;
        access_log off;                     # 不记录健康检查日志
    }
}


# ============================================================
# HTTPS (TLS 1.2 / 1.3) — 生产环境主入口
# ============================================================
server {
    listen 443 ssl http2;
    server_name your-domain.com;

    # ---- 证书 ----
    # 生产: Let's Encrypt (certbot)
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # 开发: 自签名证书 (openssl)
    # ssl_certificate     /etc/nginx/ssl/edu-dev-cert.pem;
    # ssl_certificate_key /etc/nginx/ssl/edu-dev-key.pem;

    # ---- TLS 协议与加密套件 ----
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ---- OCSP Stapling（减少客户端 OCSP 查询延迟） ----
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/your-domain.com/chain.pem;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ---- 日志 ----
    access_log /var/log/nginx/edu-server-https-access.log;
    error_log  /var/log/nginx/edu-server-https-error.log;

    # ---- 安全响应头 ----
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-XSS-Protection "1; mode=block";

    # ============================================================
    # 1. Auth 接口 (限流)
    # ============================================================
    location /api/auth/ {
        limit_req zone=edu_auth burst=3 nodelay;

        proxy_pass http://127.0.0.1:55555/api/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # ============================================================
    # 2. 通用 API
    # ============================================================
    location /api/ {
        limit_req zone=edu_api burst=20 nodelay;

        proxy_pass http://127.0.0.1:55555/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 16k;
        proxy_busy_buffers_size 24k;
    }

    # ============================================================
    # 3. 视频流媒体
    # ============================================================
    location /api/videos/ {
        limit_req zone=edu_api burst=30 nodelay;

        proxy_pass http://127.0.0.1:55555/api/videos/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ============================================================
    # 4. 内部视频文件（X-Accel-Redirect 目标）
    # ============================================================
    location /internal/video/ {
        internal;
        alias /srv/edu/uploads/videos/;

        add_header Accept-Ranges bytes;

        types {
            video/mp4  mp4;
            video/webm webm;
            video/x-msvideo avi;
            video/quicktime mov;
            video/x-matroska mkv;
            video/x-flv flv;
        }
    }

    location /internal/cover/ {
        internal;
        alias /srv/edu/uploads/covers/;

        types {
            image/jpeg jpg jpeg;
            image/png  png;
            image/webp webp;
        }
    }

    # ============================================================
    # 5. 公开封面
    # ============================================================
    location /api/files/cover/ {
        proxy_pass http://127.0.0.1:55555/api/files/cover/;
        proxy_set_header Host $host;

        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    # ============================================================
    # 6. 文件上传
    # ============================================================
    location /api/files/upload/ {
        limit_req zone=edu_api burst=5 nodelay;

        proxy_pass http://127.0.0.1:55555/api/files/upload/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # ============================================================
    # 7. API 文档
    # ============================================================
    location /docs {
        proxy_pass http://127.0.0.1:55555/docs;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://127.0.0.1:55555/openapi.json;
        proxy_set_header Host $host;
    }

    # ============================================================
    # 8. WebSocket（第二阶段）
    # ============================================================
    # location /ws/ {
    #     proxy_pass http://127.0.0.1:55555/ws/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "upgrade";
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto https;
    #
    #     proxy_read_timeout 86400s;
    #     proxy_send_timeout 86400s;
    # }

    # ============================================================
    # 9. 健康检查
    # ============================================================
    location /health {
        proxy_pass http://127.0.0.1:55555/;
        proxy_set_header Host $host;
        access_log off;
    }
}


# ============================================================
# HTTP → HTTPS 强制跳转
# ============================================================
server {
    listen 80;
    server_name your-domain.com;

    # Let's Encrypt ACME 验证（certbot 自动管理）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 其余全部重定向到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

